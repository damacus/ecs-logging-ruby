---
## Test with multiple ruby images and frameworks
name: test

on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        ruby-image:
          - 'ruby:4.0'
          - 'ruby:3.4'
          - 'ruby:3.3'
          - 'ruby:3.2'
        framework:
          - 'rails-8.1'
          - 'rails-8.0'
          - 'rails-7.2'
          - 'sinatra-2.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Ruby version
        id: ruby_version
        run: echo "value=${RUBY_IMAGE#ruby:}" >> "${GITHUB_OUTPUT}"
        env:
          RUBY_IMAGE: ${{ matrix.ruby-image }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.ruby_version.outputs.value }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rspec

      - name: prepare artifact name # because it cannot have colons ":"
        id: artifact_name
        run: |
          echo "artifact_name=test-results-${RUBY_IMAGE//:/_}-${FRAMEWORK}" >> "${GITHUB_OUTPUT}"
        env:
          RUBY_IMAGE: ${{ matrix.ruby-image }}
          FRAMEWORK: ${{ matrix.framework }}

      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: ${{ steps.artifact_name.outputs.artifact_name }}
          path: 'spec/junit-reports/**/*-junit.xml'
